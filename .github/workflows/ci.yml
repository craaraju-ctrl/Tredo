# =============================================================================
#  Tredo — CI Pipeline
# =============================================================================
# Runs on every push and pull request to main.
# Builds the full workspace with multi-broker support.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  # ── Build & Lint ────────────────────────────────────────────────────────
  check:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable --component rustfmt --component clippy
          rustup default stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: tredo-cargo-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            tredo-cargo-

      - name: cargo build (workspace)
        run: cargo build --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo fmt
        run: cargo fmt --check

  # ── Tests (on debug for faster iteration) ──────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup set profile minimal
          rustup toolchain install stable
          rustup default stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: tredo-cargo-test-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            tredo-cargo-test-
            tredo-cargo-

      - name: cargo test
        run: cargo test --workspace
